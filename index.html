<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微信赞赏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .container {
            text-align: center;
            padding: 20px;
        }
        
        .photo-frame {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 90vw;
            max-height: 80vh;
        }
        
        img {
            max-width: 100%;
            max-height: 70vh;
            border-radius: 8px;
            display: block;
        }
        
        .caption {
            color: #a0a0a0;
            margin-top: 15px;
            font-size: 14px;
            letter-spacing: 1px;
        }
        
        .loading {
            color: #fff;
            font-size: 18px;
        }
        
        .error {
            color: #ff6b6b;
            background: rgba(255,107,107,0.1);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #ff6b6b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="photo-frame">
            <!-- 核心：读取同目录下的 zs.png -->
            <img src="zs.png" 
                 alt="zs.png" 
                 onerror="this.style.display='none'; document.getElementById('error-msg').style.display='block';"
                 onload="document.getElementById('loading').style.display='none';">
            
            <div id="loading" class="loading">加载中...</div>
            <div id="error-msg" class="error" style="display: none;">
                无法加载图片<br>
                请确保 <code>zs.png</code> 与 <code>index.html</code> 在同一目录
            </div>
        </div>
        <div class="caption">zs.png</div>
    </div>
</body>
</html>
